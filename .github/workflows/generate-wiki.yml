name: Generate Wiki

on:
  push:
    branches:
    - main
    paths:
    - lua/**
    - scripts/generate-wiki-api.ps1
    - scripts/wiki-api.config.ps1
    - scripts/bootstrap.ps1
    - scripts/install-tools.ps1
    - .github/workflows/generate-wiki.yml

  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate_wiki:
    name: Generate Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: Doors

      # Sibling addons on the .luarc.json workspace library - glua_ls needs them to
      # resolve cross-addon types (e.g. a hook receiver inferred through linked_portal_door).
      - name: Checkout world-portals
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/world-portals
          ref: main
          path: world-portals

      - name: Checkout wire
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.28.1
          path: gmod-addon-tools

      # The wiki is a separate git repo (<repo>.wiki.git). The default GITHUB_TOKEN
      # cannot push to it, so authenticate the clone with the PAT instead.
      - name: Clone wiki
        run: git clone "https://x-access-token:${{ secrets.TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Install tooling
        working-directory: Doors
        run: ./scripts/install-tools.ps1
        shell: pwsh

      - name: Generate wiki pages
        working-directory: Doors
        run: ./scripts/generate-wiki-api.ps1 -WikiPath ../wiki
        shell: pwsh

      - name: Commit and push
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes."
          else
            git commit -m "Update API reference (${{ github.sha }})"
            git push
          fi
