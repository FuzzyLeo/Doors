name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - renovate/*
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        description: Publish to workshop
      addon:
        type: choice
        description: Workshop addon
        options:
        - beta

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: Doors

      - name: Checkout world-portals
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/world-portals
          ref: main
          path: world-portals

      - name: Checkout wire
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.28.2
          path: gmod-addon-tools

      - name: Run glua_check
        working-directory: Doors
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('Doors/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: Doors/results.sarif
          checkout_path: ${{ github.workspace }}/Doors
          category: glua_check

  typing-check:
    name: Typing Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: Doors

      - name: Checkout world-portals
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/world-portals
          ref: main
          path: world-portals

      - name: Checkout wire
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.28.2
          path: gmod-addon-tools

      - name: Run typing check
        working-directory: Doors
        shell: pwsh
        run: ./scripts/typing-check.ps1

  setup:
    name: Resolve workshop target
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.publish == 'true'
    outputs:
      id: ${{ steps.pick.outputs.id }}
    steps:
      - name: Pick workshop id
        id: pick
        run: |
          if [[ "${{ github.event.inputs.addon }}" == "beta" || "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "id=${{ vars.BETA_WORKSHOP_ID }}" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown workshop ID" 1>&2
            exit 1
          fi

  publish:
    name: Publish to workshop
    needs: [setup, glua-check, typing-check]
    # Serialize beta uploads so a rare double-trigger queues instead of racing gmpublish.
    concurrency:
      group: doors-beta-publish
      cancel-in-progress: false
    uses: AmyJeanes/gmod-addon-tools/.github/workflows/publish-workshop.yml@2d6fd313362d074b692004942eb3c3ef4597b77a # v0.28.2
    with:
      addon: Doors
      workshop_id: ${{ needs.setup.outputs.id }}
      mfa: false
      dry_run: ${{ needs.setup.outputs.id == '' }}
      merge_repo: AmyJeanes/world-portals
      merge_ref: main
    secrets:
      STEAM_USERNAME: ${{ vars.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      HA_WEBHOOK_URL: ${{ secrets.HA_WEBHOOK_URL }}
