name: GLua Check

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  glua-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: Doors

      - name: Checkout world-portals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: AmyJeanes/world-portals
          ref: dev
          path: world-portals

      - name: Checkout wire
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Install glua_check
        run: |
          url=$(gh api repos/Pollux12/gmod-glua-ls/releases/latest \
              --jq '.assets[] | select(.name == "glua_check-linux-x64.tar.gz") | .browser_download_url')
          curl -sL -o glua_check.tar.gz "$url"
          mkdir -p "$HOME/.local/bin"
          tar -xzf glua_check.tar.gz -C "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/glua_check"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch GLua API stubs
        working-directory: Doors
        run: |
          mkdir -p .tools/glua-api
          url=$(gh api repos/luttje/glua-api-snippets/releases/latest \
              --jq '.assets[] | select(.name | endswith(".lua.zip")) | .browser_download_url')
          curl -sL -o .tools/glua-api.zip "$url"
          unzip -q -o .tools/glua-api.zip -d .tools/glua-api/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run glua_check
        working-directory: Doors
        run: glua_check .
